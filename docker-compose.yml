services:
  postgres:
    image: postgres:16-alpine
    container_name: taxa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxa
      POSTGRES_USER: taxa
      POSTGRES_PASSWORD: taxa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxa -d taxa"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
